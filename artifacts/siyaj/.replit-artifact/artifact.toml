kind = "mobile"
previewPath = "/"
title = "سياج - إدارة الراوتر"
version = "1.0.0"
id = "artifacts/siyaj"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21721

[services.development]
run = "pnpm --filter @workspace/siyaj run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/siyaj", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/siyaj", "run", "serve" ]

[services.env]
PORT = "21721"
BASE_PATH = "/"
